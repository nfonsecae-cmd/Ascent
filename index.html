<title>ASCENT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:dark;
  --bg:#070810;
  --panel:rgba(255,255,255,.045); --panel2:rgba(255,255,255,.07);
  --card:#10131F;
  --line:rgba(255,255,255,.09); --line-hi:rgba(255,255,255,.2);
  --txt:#F2F4FB; --muted:#9AA3BF; --faint:#5D6580;
  --blue:#3E8BFF; --blue-hi:#6FAEFF; --purple:#8B5CFF; --purple-hi:#AB8CFF;
  --green:#3BE58B; --red:#FF4D5E;
  --ring:linear-gradient(120deg,#FF5CA8,#8B5CFF 45%,#3E8BFF 75%,#45D8D0);
  --grad:linear-gradient(100deg,#3E8BFF,#8B5CFF);
  --pop-bg:#141827;
  --gA:139,92,255; --gB:255,92,168; --gC:62,139,255; --gD:69,216,208;
  --bkt-today:#FF5CA8; --bkt-week:#6FAEFF; --bkt-later:#45D8D0;
  --blur:blur(16px) saturate(1.3);
  --r:11px;
}
/* ===== EMBER ACCENT — gold / orange / warm brown ===== */
html[data-accent="ember"]{
  --bg:#0B0805;
  --bkt-today:#FFC93D; --bkt-week:#F08A3C; --bkt-later:#C8862E;
  --card:#181109;
  --pop-bg:#1C150B;
  --line:rgba(255,220,170,.1); --line-hi:rgba(255,220,170,.24);
  --txt:#F7F1E6; --muted:#B0A188; --faint:#6E6350;
  --blue:#F5B84A; --blue-hi:#FFD97E; --purple:#F0B23C; --purple-hi:#FFD46B;
  --ring:linear-gradient(120deg,#FFE066,#FFC93D 40%,#F0A22E 70%,#C8862E);
  --grad:linear-gradient(100deg,#FFC93D,#E89A2E);
  --gA:230,134,42; --gB:196,92,26; --gC:214,110,40; --gD:200,150,90;
}
html[data-theme="light"][data-accent="ember"]{
  --bg:#F6F1E7;
  --bkt-today:#C9921E; --bkt-week:#C96F22; --bkt-later:#96601E;
  --panel:rgba(255,255,255,.6); --panel2:rgba(255,255,255,.78);
  --card:#FFFFFF; --pop-bg:#FFFFFF;
  --line:rgba(70,45,15,.12); --line-hi:rgba(70,45,15,.26);
  --txt:#241A0E; --muted:#7A6A50; --faint:#A5967C;
  --blue:#C9921E; --blue-hi:#A87710; --purple:#C9921E; --purple-hi:#A87710;
  --green:#0EA95D; --red:#D42430;
}
/* ===== IVORY: crisp white + refined gold ===== */
html[data-theme="light"][data-accent="ivory"]{
  --bg:#FFFFFF;
  --bkt-today:#B8860B; --bkt-week:#C06A1E; --bkt-later:#8A6A2E;
  --panel:#FCFAF6; --panel2:#F7F3EC;
  --card:#FFFFFF; --pop-bg:#FFFFFF;
  --line:rgba(40,30,10,.1); --line-hi:rgba(40,30,10,.2);
  --txt:#1C1710; --muted:#6E6558; --faint:#A69E8E;
  --blue:#B8860B; --blue-hi:#9A6F08; --purple:#B8860B; --purple-hi:#9A6F08;
  --green:#0E9C57; --red:#CE2130;
  --ring:linear-gradient(120deg,#E8C56A,#D4A62E 45%,#C08A1E 75%,#A0742A);
  --grad:linear-gradient(100deg,#D4A62E,#B8860B);
  --gA:200,150,40; --gB:190,120,30; --gC:210,165,60; --gD:180,150,90;
}
html[data-theme="light"]{
  --bg:#F4F2F3;
  --bkt-today:#E0338A; --bkt-week:#2E6FE8; --bkt-later:#0E9C94;
  --panel:rgba(255,255,255,.6); --panel2:rgba(255,255,255,.75);
  --card:#FFFFFF;
  --line:rgba(20,25,50,.1); --line-hi:rgba(20,25,50,.22);
  --txt:#171B2E; --muted:#5C6484; --faint:#9299B4;
  --blue:#2E6FE8; --blue-hi:#1D5FE0; --purple:#7B3BF5; --purple-hi:#6E22F0;
  --green:#0EA95D; --red:#E02438;
  --pop-bg:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg) !important}
body{
  background:transparent !important;
  color:var(--txt);
  font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:12.5px;
  -webkit-font-smoothing:antialiased;min-height:100vh;position:relative;
}
/* ===== AURORA BACKGROUND ===== */
.bg-layer{position:fixed;inset:0;z-index:-1;background:
  radial-gradient(760px 460px at 18% -8%, rgba(var(--gA),.28), transparent 60%),
  radial-gradient(820px 480px at 82% -6%, rgba(var(--gC),.24), transparent 62%),
  radial-gradient(560px 380px at 96% 42%, rgba(var(--gB),.10), transparent 58%),
  radial-gradient(620px 420px at 2% 70%, rgba(var(--gD),.07), transparent 58%),
  var(--bg)}
html[data-theme="light"] .bg-layer{background:
  radial-gradient(720px 460px at 20% -6%, rgba(var(--gA),.35), transparent 60%),
  radial-gradient(760px 460px at 80% -4%, rgba(var(--gB),.3), transparent 62%),
  radial-gradient(560px 400px at 94% 46%, rgba(var(--gD),.24), transparent 58%),
  radial-gradient(560px 400px at 4% 74%, rgba(var(--gC),.22), transparent 58%),
  var(--bg)}
html[data-accent="ember"] .bg-layer{background:
  radial-gradient(720px 280px at 72% -16%, rgba(var(--gA),.12), transparent 62%),
  var(--bg)}
html[data-theme="light"][data-accent="ember"] .bg-layer{background:
  radial-gradient(720px 280px at 72% -16%, rgba(var(--gA),.2), transparent 62%),
  var(--bg)}
html[data-theme="light"][data-accent="ivory"] .bg-layer{background:
  radial-gradient(640px 240px at 76% -18%, rgba(var(--gA),.1), transparent 60%),
  var(--bg)}
.wrap{max-width:760px;margin:0 auto;padding:0 18px 90px}

/* ===== SIGNATURE: GLOWING GRADIENT RING ===== */
.gb{border:1px solid transparent;border-radius:var(--r);
  background:linear-gradient(var(--card),var(--card)) padding-box, var(--ring) border-box;
  box-shadow:0 0 26px -10px rgba(var(--gA),.55), 0 0 26px -14px rgba(var(--gB),.45)}
html[data-theme="light"] .gb{box-shadow:0 0 26px -10px rgba(var(--gA),.35), 0 6px 20px -10px rgba(20,25,50,.15)}

/* ============ HEADER ============ */
header{padding:14px 0 0;position:relative}
header::before{content:'';position:absolute;top:-20px;right:-40px;
  width:340px;max-width:70vw;height:130px;pointer-events:none;z-index:0;filter:blur(22px);
  background:radial-gradient(closest-side at 76% 10%, rgba(var(--gA),.75), rgba(var(--gB),.35) 50%, transparent 78%);
  -webkit-mask-image:linear-gradient(to bottom, black 50%, transparent 94%);
  mask-image:linear-gradient(to bottom, black 50%, transparent 94%)}
html[data-accent="ivory"] header::before{
  background:radial-gradient(closest-side at 76% 10%, rgba(var(--gA),.4), rgba(var(--gB),.15) 50%, transparent 78%)}
header>*{position:relative;z-index:1}
.topbar{display:flex;align-items:center;gap:10px;padding:0 2px}
.brandrow{display:inline-flex;align-items:center;gap:9px}
.brandmark{width:26px;height:26px;flex:none;filter:drop-shadow(0 0 10px rgba(var(--gA),.5))}
.brandword{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;letter-spacing:.28em;text-indent:.28em;color:var(--txt)}
.brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;letter-spacing:.28em;text-indent:.28em;color:var(--txt)}
.hdate{font-family:'Space Grotesk',sans-serif;font-size:9px;font-weight:500;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin-left:auto;white-space:nowrap}
.gear{flex:none;width:32px;height:32px;margin-left:10px;border-radius:9px;background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.gear:hover{border-color:var(--line-hi);color:var(--txt);box-shadow:0 0 14px -5px rgba(var(--gA),.7)}
nav{display:flex;justify-content:flex-start;gap:4px;margin:14px 0 4px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{background:none;border:1px solid transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:11.5px;font-weight:500;padding:5px 11px;border-radius:999px;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--txt)}
.tab.on{color:var(--txt);border:1px solid transparent;border-radius:999px;
  background:linear-gradient(var(--card),var(--card)) padding-box, var(--ring) border-box;
  box-shadow:0 0 16px -8px rgba(var(--gA),.7)}
.tab .cnt{font-size:10px;color:var(--faint);margin-left:4px}
.tab.on .cnt{color:var(--purple-hi)}

/* settings sheet */
.settings-sheet{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.35);display:flex;align-items:flex-start;justify-content:flex-end;padding:58px 16px 0}
.settings-sheet.hidden{display:none}
.ss-panel{background:var(--pop-bg);border:1px solid var(--line-hi);border-radius:14px;padding:10px;min-width:230px;box-shadow:0 14px 46px rgba(0,0,0,.3)}
.ss-row{font-family:'Space Grotesk',sans-serif;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:8px 8px 5px}
.ss-opts{display:flex;flex-direction:column;gap:5px;margin-bottom:4px}
.ss-btn{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);font-size:13px;padding:9px 11px;border-radius:9px;cursor:pointer;font-family:inherit;text-align:left}
.ss-btn:hover{border-color:var(--purple);color:var(--txt)}
.ss-swatch{width:14px;height:14px;border-radius:50%;background:var(--ring);flex:none}

.mng-add{display:flex;gap:8px;margin:0 0 12px}
.mng-add input{flex:1;background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:8px 12px;font-size:13px;font-family:inherit;outline:none}
.mng-add input:focus{border-color:var(--purple)}
.mng-add button{background:var(--grad);border:none;color:#fff;font-weight:600;font-size:12.5px;padding:8px 16px;border-radius:10px;cursor:pointer;font-family:'Space Grotesk',sans-serif;white-space:nowrap}
.mng-add button:hover{filter:brightness(1.12)}
.mng-list{margin-bottom:8px}
.mng-row{display:flex;align-items:center;gap:10px;background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);border-radius:10px;padding:9px 13px;margin-bottom:6px}
.mng-name{flex:1;font-size:13.5px;color:var(--txt)}
.mng-use{font-size:11px;color:var(--faint);font-family:'Space Grotesk',sans-serif}
.mng-edit,.mng-del{background:none;border:none;cursor:pointer;font-size:12px;font-family:inherit;color:var(--faint);padding:2px 4px}
.mng-edit:hover{color:var(--purple-hi)}
.mng-del:hover{color:var(--red)}
.mng-rename{flex:1;background:var(--panel2);border:1px solid var(--purple);border-radius:7px;color:var(--txt);padding:5px 9px;font-size:13px;font-family:inherit;outline:none}
.mng-save{background:var(--grad);border:none;color:#fff;font-size:11px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit}

/* ============ SECTIONS ============ */
.sec-head{display:flex;align-items:center;gap:10px;margin:28px 0 12px}
.sec-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:.22em;color:var(--txt);white-space:nowrap}
.sec-dot{width:6px;height:6px;border-radius:50%;background:var(--ring);box-shadow:0 0 10px rgba(var(--gA),.9);flex:none}
.sec-line{flex:1;height:1px;background:var(--line)}
.sec-count{font-size:12px;color:var(--faint);font-family:'Space Grotesk',sans-serif}
.sec-toggle{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:inherit}
.sec-toggle:hover{color:var(--purple-hi)}
.sec-caret{color:var(--faint);font-size:9px;transition:transform .15s;display:inline-block;margin-right:-2px}
.sec-caret.open{transform:rotate(90deg)}

/* sub-status group label */
.substat{display:flex;align-items:center;gap:7px;margin:12px 2px 6px;font-family:'Space Grotesk',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.substat-dot{width:6px;height:6px;border-radius:50%;flex:none}
.substat-n{font-size:10px;color:var(--faint);margin-left:2px}

/* pinned */
.pin-band{margin-bottom:4px}
.task.pinned{box-shadow:0 0 20px -10px rgba(var(--gA),.7);border-left:2px solid rgba(var(--gA),.7)}
.pinbtn{background:none;border:none;color:var(--faint);cursor:pointer;font-size:14px;line-height:1;flex:none;padding:0 2px;transition:color .12s,transform .12s}
.pinbtn:hover{transform:scale(1.2)}
.pinbtn.on{color:var(--blue-hi);text-shadow:0 0 8px currentColor}
.person-chip{color:var(--red)!important;border-color:rgba(255,77,94,.45)!important;background:rgba(255,77,94,.08)!important}

/* filter bar */
.filterbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:14px 0 4px;padding:9px 11px;border-radius:12px;
  background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line)}
.fb-label{font-family:'Space Grotesk',sans-serif;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:600}
.fb-sep{width:1px;height:16px;background:var(--line);margin:0 3px}
.fb-chip{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);color:var(--muted);font-size:11.5px;padding:4px 10px;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .12s}
.fb-chip:hover{border-color:var(--line-hi);color:var(--txt)}
.fb-chip.on{color:var(--txt);border:1px solid transparent;background:linear-gradient(var(--card),var(--card)) padding-box, var(--ring) border-box;box-shadow:0 0 12px -5px rgba(var(--gA),.8)}
.fbdot{width:7px;height:7px;border-radius:50%;flex:none}

/* collapsible daily note */
.dn-head{display:flex;align-items:center;gap:8px;cursor:pointer}
.dn-head label{margin-bottom:0;cursor:pointer}
.dn-caret{color:var(--purple-hi);font-size:11px;margin-left:-2px}
.dn-peek{color:var(--faint);font-size:12.5px;margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}
.daily-note textarea{margin-top:8px}

/* help card */
.help-card{border:1px solid var(--line);border-radius:var(--r);margin-top:16px;overflow:hidden;background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
.help-head{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;letter-spacing:.04em;color:var(--purple-hi)}
.help-body{padding:2px 15px 14px;font-size:12.5px;line-height:1.5;color:var(--muted)}
.help-body p{margin:8px 0}
.help-body b{color:var(--txt);font-weight:600}

/* section rename + tag mini buttons */
.catedit{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;font-family:inherit;padding:0 2px}
.catedit:hover{color:var(--purple-hi)}
.cat-rename{background:var(--panel);border:1px solid var(--purple);border-radius:7px;padding:5px 9px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;outline:none;min-width:0;flex:1}
.catsave{background:var(--grad);border:none;color:#fff;font-size:11px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit}
.tag-rename{flex:1;background:var(--panel);border:1px solid var(--purple);border-radius:6px;color:var(--txt);padding:5px 8px;font-size:12.5px;font-family:inherit;outline:none;min-width:0}
.opt-mini.save{color:var(--green);visibility:visible;font-size:13px}
.opt-label{flex:1}
.opt-mini{background:none;border:none;color:var(--faint);cursor:pointer;font-size:11px;padding:0 3px;visibility:hidden}
.opt:hover .opt-mini{visibility:visible}
.opt-mini:hover{color:var(--purple-hi)}

/* ============ NOTES (post-its) ============ */
.notes-block{border:1px solid transparent;border-radius:var(--r);margin-top:26px;position:relative;
  background:linear-gradient(var(--card),var(--card)) padding-box, var(--ring) border-box;
  box-shadow:0 0 30px -10px rgba(var(--gA),.5),0 0 30px -16px rgba(var(--gB),.45)}
html[data-theme="light"] .notes-block{box-shadow:0 0 26px -10px rgba(var(--gA),.3),0 8px 22px -12px rgba(20,25,50,.15)}
.nb-head{display:flex;align-items:center;gap:8px;cursor:pointer;padding:12px 15px}
.nb-head label{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:.22em;color:var(--purple-hi);font-weight:600;text-transform:uppercase;cursor:pointer}
.nb-count{font-size:10px;color:var(--faint);font-family:'Space Grotesk',sans-serif}
.nb-caret{color:var(--purple-hi);font-size:11px}
.nb-peek{color:var(--faint);font-size:12px;margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%}
.nb-add{display:flex;gap:8px;padding:0 15px 10px}
.nb-add input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:8px 11px;font-size:13px;font-family:inherit;outline:none}
.nb-add input:focus{border-color:var(--purple)}
.nb-add button{background:var(--grad);border:none;color:#fff;font-weight:600;font-size:12px;padding:8px 15px;border-radius:9px;cursor:pointer;font-family:'Space Grotesk',sans-serif}
.nb-list{padding:0 15px 14px;display:flex;flex-direction:column;gap:7px}
.postit{display:flex;align-items:flex-start;gap:9px;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--faint);border-radius:9px;padding:9px 11px}
.postit.pinned{border-left-color:var(--blue-hi);box-shadow:0 0 14px -8px rgba(var(--gA),.7)}
.postit-pin{background:none;border:none;cursor:pointer;font-size:13px;line-height:1;flex:none;padding:0;opacity:.85}
.postit-pin:hover{transform:scale(1.15)}
.postit-text{flex:1;font-size:13px;line-height:1.5;color:var(--txt);cursor:text;word-break:break-word}
.postit-del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;flex:none}
.postit-del:hover{color:var(--red)}
.postit-edit{width:100%;background:var(--card);border:1px solid var(--purple);border-radius:7px;color:var(--txt);padding:8px 10px;font-size:13px;line-height:1.5;font-family:inherit;outline:none;resize:vertical;min-height:56px}
.postit-actions{display:flex;justify-content:flex-end;margin-top:6px;width:100%}
.postit-save{background:var(--grad);border:none;color:#fff;font-size:11px;font-weight:600;padding:5px 14px;border-radius:7px;cursor:pointer;font-family:inherit}

/* sub-badge, sched chip, editable title, sub edit */
.sub-badge{font-size:10px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:2px 8px;white-space:nowrap}
.sched-chip{color:var(--blue-hi)!important;border-color:rgba(var(--gA),.4)!important}
.ttitle[data-act="titleedit"]{cursor:text}
.ttitle[data-act="titleedit"]:hover{text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
.title-edit{width:100%;background:var(--card);border:1px solid var(--purple);border-radius:7px;color:var(--txt);padding:5px 8px;font-size:13px;font-family:inherit;outline:none}
.subtext{cursor:text}
.subtext:hover{text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
.subedit-in{flex:1;background:var(--card);border:1px solid var(--purple);border-radius:6px;color:var(--txt);padding:4px 8px;font-size:13px;font-family:inherit;outline:none}
.sched-input{background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--txt);padding:7px 10px;font-size:13px;font-family:inherit;outline:none}
.sched-input:focus{border-color:var(--purple)}
.ghost.sched{border-color:rgba(var(--gA),.4)}
.ghost.sched .ghost-ic{color:var(--blue-hi)}

/* scheduled tab add bar */
.sched-add{display:flex;gap:8px;margin:12px 0 6px;flex-wrap:wrap}
.sched-add input[type="text"],.sched-add #schAddTitle{flex:1;min-width:160px;background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:9px 13px;font-size:13px;font-family:inherit;outline:none}
.sched-add input[type="date"]{background:var(--panel);border:1px solid var(--line);border-radius:10px;color:var(--txt);padding:9px 12px;font-size:13px;font-family:inherit;outline:none}
.sched-add input:focus{border-color:var(--purple)}
.sched-add button{background:var(--grad);border:none;color:#fff;font-weight:600;font-size:12.5px;padding:9px 18px;border-radius:10px;cursor:pointer;font-family:'Space Grotesk',sans-serif;white-space:nowrap}
.sched-add button:hover{filter:brightness(1.12)}

/* ============ ADD BAR ============ */
.addbar{display:flex;gap:8px;margin:16px 0 4px}
.addbar input{flex:1;background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);border-radius:var(--r);color:var(--txt);padding:11px 15px;font-family:inherit;font-size:14px;outline:none;transition:all .15s}
.addbar input:focus{border-color:var(--purple);box-shadow:0 0 20px -6px rgba(var(--gA),.85)}
.addbar input::placeholder{color:var(--faint)}
.addbar button{background:var(--grad);border:none;color:#fff;font-weight:600;font-size:14px;padding:0 22px;border-radius:var(--r);cursor:pointer;font-family:'Space Grotesk',sans-serif;box-shadow:0 0 20px -7px rgba(var(--gA),.9);transition:filter .15s}
.addbar button:hover{filter:brightness(1.15)}

/* ============ TASK ROW — frosted glass ============ */
.task{background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);border-radius:var(--r);margin-bottom:6px;transition:border-color .15s,opacity .3s,transform .3s,box-shadow .15s}
.task:hover{border-color:var(--line-hi);box-shadow:0 0 22px -12px rgba(var(--gA),.6)}
.task.overdue{border-left:3px solid var(--red);box-shadow:0 0 24px -9px rgba(255,77,94,.7)}
.task.leaving{opacity:0;transform:translateX(24px)}
.trow{display:flex;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;position:relative}
.ck{flex:none;width:17px;height:17px;border:1.5px solid var(--faint);border-radius:50%;background:none;cursor:pointer;transition:all .15s}
.ck:hover{border-color:var(--green);background:rgba(59,229,139,.16);box-shadow:0 0 12px -2px rgba(59,229,139,.8)}
.ttitle{flex:1;min-width:0;font-size:13px;line-height:1.35;color:var(--txt);overflow-wrap:break-word}
.tmeta{display:flex;align-items:center;gap:6px;flex:none;flex-wrap:wrap;justify-content:flex-end}

.chip{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:10px;font-weight:500;padding:3.5px 9px;border-radius:999px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .12s}
.chip:hover{border-color:var(--line-hi);color:var(--txt)}
.chip .dd{font-size:8px;color:var(--faint);margin-left:1px}
.chip.bucket-Today{color:var(--txt);border:1px solid transparent;
  background:linear-gradient(var(--card),var(--card)) padding-box, var(--ring) border-box;
  box-shadow:0 0 12px -4px rgba(var(--gA),.8)}
.chip.bucket-Week{color:var(--blue-hi);border-color:rgba(var(--gC),.35)}
.chip.bucket-Later{color:var(--purple-hi);border-color:rgba(var(--gA),.35)}

.sdot{width:7px;height:7px;border-radius:50%;flex:none}
.s-ns{color:var(--muted)}.s-ns .sdot{background:var(--faint)}
.s-ip{color:var(--green)!important;border-color:rgba(59,229,139,.5)!important;background:rgba(59,229,139,.08)!important}.s-ip .sdot{background:var(--green);box-shadow:0 0 8px rgba(59,229,139,1)}
.s-fu{color:var(--red)!important;border-color:rgba(255,77,94,.5)!important;background:rgba(255,77,94,.08)!important}.s-fu .sdot{background:var(--red);box-shadow:0 0 8px rgba(255,77,94,.9)}

.tagb{background:rgba(var(--gA),.14);border:1px solid rgba(var(--gA),.4);color:var(--purple-hi);font-size:10.5px;padding:2.5px 8px;border-radius:999px;white-space:nowrap}
.overdue-tag{background:rgba(255,77,94,.14);border:1px solid rgba(255,77,94,.5);color:var(--red);font-size:10px;padding:2.5px 8px;border-radius:999px;font-weight:600;letter-spacing:.06em}
.src-tag{color:var(--faint);font-size:11px}
.tagplus{background:none;border:1px dashed var(--line-hi);color:var(--faint);width:22px;height:22px;border-radius:50%;cursor:pointer;font-size:13px;line-height:1;flex:none}
.tagplus:hover{color:var(--purple-hi);border-color:var(--purple-hi)}
.caret{color:var(--faint);font-size:10px;flex:none;transition:transform .15s}
.task.open .caret{transform:rotate(90deg)}
.promote{background:none;border:1px solid rgba(59,229,139,.5);color:var(--green);font-size:11px;font-weight:600;padding:3.5px 11px;border-radius:999px;cursor:pointer;font-family:inherit;white-space:nowrap}
.promote:hover{background:var(--green);color:#070810;box-shadow:0 0 14px -3px rgba(59,229,139,.9)}

/* ============ TASK DETAIL ============ */
.tdetail{border-top:1px solid var(--line);padding:12px 15px 14px;display:none}
.task.open .tdetail{display:block}
.dlabel{font-family:'Space Grotesk',sans-serif;font-size:10px;letter-spacing:.2em;color:var(--purple-hi);font-weight:600;text-transform:uppercase;margin:12px 0 6px}
.dlabel:first-child{margin-top:0}
.subtask{display:flex;align-items:center;gap:9px;padding:4px 0}
.sck{flex:none;width:15px;height:15px;border:1.5px solid var(--faint);border-radius:5px;background:none;cursor:pointer;color:var(--green);font-size:10px;line-height:1;display:flex;align-items:center;justify-content:center}
.sck.done{border-color:rgba(59,229,139,.7);background:rgba(59,229,139,.16)}
.subtask span{font-size:13.5px;color:var(--txt);flex:1}
.subtask span.done{color:var(--faint);text-decoration:line-through}
.subtask .del{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;visibility:hidden}
.subtask:hover .del{visibility:visible}
.sub-add{display:flex;gap:6px;margin-top:6px}
.sub-add input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:6px 10px;font-size:13px;font-family:inherit;outline:none}
.sub-add input:focus{border-color:var(--purple)}
.notes-ta{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:9px 11px;font-size:13.5px;line-height:1.55;font-family:inherit;outline:none;resize:vertical;min-height:70px}
.notes-ta:focus{border-color:var(--purple)}
.tdel{background:none;border:none;color:var(--faint);font-size:12px;cursor:pointer;margin-top:12px;font-family:inherit}
.tdel:hover{color:var(--red)}

/* ============ POPOVER / DROPDOWN ============ */
.pop{position:absolute;z-index:50;background:var(--pop-bg);border:1px solid transparent;border-radius:14px;padding:6px;min-width:175px;
  background:linear-gradient(var(--pop-bg),var(--pop-bg)) padding-box, var(--ring) border-box;

.pop .opt{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;font-size:13px;color:var(--txt)}
.pop .opt:hover{background:rgba(var(--gA),.14)}
.pop .opt.cur{background:rgba(var(--gA),.2)}
.pop .opt .box{width:14px;height:14px;border:1.5px solid var(--faint);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--green);flex:none}
.pop .opt.sel .box{border-color:var(--green);background:rgba(59,229,139,.16)}
.pop .opt .odot{width:8px;height:8px;border-radius:50%;flex:none}

.pop input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:7px 9px;font-size:12.5px;font-family:inherit;outline:none;margin-top:5px}

/* ============ RECURRING ============ */
.section-bar{display:flex;gap:8px;margin:14px 0 8px}
.rule-cta{display:flex;justify-content:flex-end;margin:0 0 14px}
.section-add{display:flex;gap:8px;flex:1;align-items:center}

.section-add input:focus{border-color:var(--purple)}
.section-add button{background:none;border:1px solid rgba(var(--gA),.55);color:var(--purple-hi);font-weight:600;font-size:12.5px;padding:8px 15px;border-radius:10px;cursor:pointer;font-family:'Space Grotesk',sans-serif;white-space:nowrap}
.section-add button:hover{background:var(--purple);color:#fff;box-shadow:0 0 16px -4px rgba(var(--gA),.9)}
.cat{margin-bottom:10px}
.cat-head{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--panel2);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);border-radius:var(--r);cursor:pointer}
.cat-head:hover{border-color:var(--line-hi)}
.cat-head .name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--txt)}
.cat-head .n{font-size:11px;color:var(--faint)}
.cat-head .catdel{background:none;border:none;color:var(--faint);cursor:pointer;font-size:13px;font-family:inherit}
.cat-head .catdel:hover{color:var(--red)}
.cat-swatch{-webkit-appearance:none;appearance:none;width:13px;height:13px;flex:none;border:none;border-radius:50%;padding:0;background:none;cursor:pointer;overflow:hidden;opacity:.95}
.cat-swatch:hover{transform:scale(1.25)}
.cat-swatch::-webkit-color-swatch-wrapper{padding:0}
.cat-swatch::-webkit-color-swatch{border:none;border-radius:50%}
.cat-swatch::-moz-color-swatch{border:none;border-radius:50%}
.cat-swatch.big{width:38px;height:38px;min-width:38px;flex:none;border-radius:10px;border:1px solid var(--line-hi);align-self:center;padding:0;cursor:pointer}
.cat-swatch.big:hover{transform:none}
.cat-swatch.big::-webkit-color-swatch{border-radius:8px}
.cat-swatch.big::-moz-color-swatch{border-radius:8px}
.cat-body{padding:8px 0 0 10px;display:none}
.cat.open .cat-body{display:block}
.rule{background:var(--panel);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px;margin-bottom:7px}
.rule .r1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rule .rtitle{font-size:14px;flex:1;min-width:120px;color:var(--txt)}
.rule .rfreq{font-size:11.5px;color:var(--green);opacity:.9}
.rule .redit,.rule .rdel{background:none;border:none;color:var(--faint);cursor:pointer;font-size:12px;font-family:inherit}
.rule .redit:hover{color:var(--blue-hi)}.rule .rdel:hover{color:var(--red)}
.rule-form{border:1px solid transparent;border-radius:var(--r);padding:16px;margin:12px 0;
  background:linear-gradient(var(--card),var(--card)) padding-box, var(--ring) border-box;
  box-shadow:0 0 32px -12px rgba(var(--gA),.6)}
.rule-form .frow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.rule-form input,.rule-form select,.rule-form textarea{background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:8px 11px;font-size:13.5px;font-family:inherit;outline:none}
.rule-form input:focus,.rule-form select:focus{border-color:var(--purple)}
.rule-form .grow{flex:1;min-width:140px}

<script>
/* ================= STATE ================= */
const STATUSES = ['Not Started','In Progress','Follow-up'];
const STATUS_META = {
  'Not Started':{cls:'s-ns', dot:'#4A5578', sub:''},
  'In Progress':{cls:'s-ip', dot:'#20E37B', sub:'on track'},
  'Follow-up':{cls:'s-fu', dot:'#FF3B4E', sub:'awaiting input'}
};
const BUCKETS = ['Today','Week','Later'];
const BUCKET_LABEL = {Today:'Today', Week:'This Week', Later:'Later'};
let state = {
  dailyNote:'',
  notes:[],
  tasks:[],
  rules:[],
  tags:['B Management Services','La María Piscícola','General Accounting'],
  people:['Carolina','Miller Salas','Nicolas Becerra'],
  categories:['BMS Operational','Client Recurrent'],
  catColors:{'BMS Operational':'#C9921E','Client Recurrent':'#8B5CFF'},
  ui:{weekOpen:false, catOpen:{}, noteOpen:false,
      bucketOpen:{Today:true,Week:true,Later:true},
      theme:'light', accent:'ivory',
      groupByStatus:true}
};
let view='dashboard';
let openTasks = new Set();
let editingRule = null;
let formTags = [];
let purgeArmed = false;
let filterStatus = null;   // null = all, or a status string
let filterPerson = null;   // null = all, or a person name
let editingNote = null;    // note id being edited inline
let renamingCat = null;    // section currently being renamed inline

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ================= PERSISTENCE (Firebase) ================= */
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async ()=>{
    try{ if(window.cloudSave) await window.cloudSave(state); }catch(e){ console.error('save failed', e); }
  },400);
}
async function load(){
  try{
    if(window.cloudLoad){
      const s = await window.cloudLoad();
      if(s){
        state = Object.assign(state, s);
        state.ui = Object.assign({weekOpen:false,catOpen:{}}, s.ui||{});
        state.tasks.forEach(t=>{ if(t.status==='Awaiting Input') t.status='Follow-up'; });
        if(!state.categories || !state.categories.length) state.categories=['General'];
        if(!state.catColors) state.catColors={};
        if(!state.people) state.people=['Carolina','Miller Salas','Nicolas Becerra'];
        if(!state.ui.bucketOpen) state.ui.bucketOpen={Today:true,Week:true,Later:true};
        if(state.ui.noteOpen===undefined) state.ui.noteOpen=false;
        if(state.ui.groupByStatus===undefined) state.ui.groupByStatus=true;
        if(!state.ui.theme) state.ui.theme='light';
        if(!state.ui.accent) state.ui.accent='ivory';
        if(!Array.isArray(state.notes)) state.notes=[];
        // migrate legacy single dailyNote string into the notes array
        if(state.dailyNote && state.dailyNote.trim()){
          state.notes.unshift({id:uid(), text:state.dailyNote.trim(), pinned:false, createdAt:Date.now()});
          state.dailyNote='';
        }
        state.tasks.forEach(t=>{ if(t.pinned===undefined) t.pinned=false; if(t.person===undefined) t.person=null; if(t.scheduledDate===undefined) t.scheduledDate=null; });
      }
    }
  }catch(e){ console.error('load failed', e); }
}

/* ================= RECURRENCE ENGINE ================= */
function ruleFreqText(r){
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(r.type==='weekly') return 'Weekly · '+days[r.weekday];
  if(r.type==='monthly') return 'Monthly · day '+r.monthday;
  if(r.type==='quarterly') return 'Quarterly · day '+r.monthday;
  if(r.type==='interval') return 'Every '+r.intervalDays+' days';
  return '';
}
function lastDueOnOrBefore(r, ref){
  const refD = new Date(ref+'T00:00:00');
  const fmt = d=> d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(r.type==='weekly'){
    const d=new Date(refD); const diff=(d.getDay()-r.weekday+7)%7; d.setDate(d.getDate()-diff); return fmt(d);
  }
  if(r.type==='monthly'){
    let y=refD.getFullYear(), m=refD.getMonth();
    for(let i=0;i<2;i++){
      const dim=new Date(y,m+1,0).getDate();
      const cand=new Date(y,m,Math.min(r.monthday,dim));
      if(cand<=refD) return fmt(cand);
      m--; if(m<0){m=11;y--;}
    }
    return null;
  }
  if(r.type==='quarterly'){
    const y=refD.getFullYear(); const qm=[0,3,6,9];
    for(let yy=y; yy>=y-1; yy--){
      for(let i=qm.length-1;i>=0;i--){
        const dim=new Date(yy,qm[i]+1,0).getDate();
        const cand=new Date(yy,qm[i],Math.min(r.monthday,dim));
        if(cand<=refD) return fmt(cand);
      }
    }
    return null;
  }
  if(r.type==='interval'){
    const anchor=new Date((r.anchor||todayStr())+'T00:00:00');
    if(anchor>refD) return null;
    const days=Math.floor((refD-anchor)/86400000);
    const k=Math.floor(days/r.intervalDays);
    const d=new Date(anchor); d.setDate(d.getDate()+k*r.intervalDays);
    return fmt(d);
  }
  return null;
}
function generateFromRules(){
  const today=todayStr();
  let changed=false;
  state.rules.forEach(r=>{
    const due = lastDueOnOrBefore(r, today);
    if(!due) return;
    // never back-fill: skip any due date on or before the rule's creation day
    if(r.createdOn && due < r.createdOn) return;
    const age=(new Date(today+'T00:00:00')-new Date(due+'T00:00:00'))/86400000;
    if(age>7) return;
    if(r.lastGen && r.lastGen>=due) return;
    state.tasks.push({
      id:uid(), title:r.title, status:'Not Started', bucket:'Today',
      tags:[...(r.tags||[])], subtasks:[], notes:r.notesTemplate||'',
      source:'recurring', ruleId:r.id, list:'active', createdAt:Date.now(), pinned:false, person:null,
      todayDate:due, completedAt:null
    });
    r.lastGen=due; changed=true;
  });
  if(changed) save();
}

// next occurrence of a rule strictly on/after a given date
function nextDueOnOrAfter(r, ref){
  const refD=new Date(ref+'T00:00:00');
  const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(r.type==='weekly'){
    const d=new Date(refD); const diff=(r.weekday-d.getDay()+7)%7; d.setDate(d.getDate()+diff); return fmt(d);
  }
  if(r.type==='monthly'){
    let y=refD.getFullYear(), m=refD.getMonth();
    for(let i=0;i<3;i++){
      const dim=new Date(y,m+1,0).getDate();
      const cand=new Date(y,m,Math.min(r.monthday,dim));
      if(cand>=refD) return fmt(cand);
      m++; if(m>11){m=0;y++;}
    }
    return null;
  }
  if(r.type==='quarterly'){
    const qm=[0,3,6,9]; let y=refD.getFullYear();
    for(let yy=y; yy<=y+1; yy++){
      for(let i=0;i<qm.length;i++){
        const dim=new Date(yy,qm[i]+1,0).getDate();
        const cand=new Date(yy,qm[i],Math.min(r.monthday,dim));
        if(cand>=refD) return fmt(cand);
      }
    }
    return null;
  }
  if(r.type==='interval'){
    const anchor=new Date((r.anchor||todayStr())+'T00:00:00');
    let d=new Date(anchor);
    if(anchor<refD){
      const days=Math.ceil((refD-anchor)/86400000);
      const k=Math.ceil(days/r.intervalDays);
      d.setDate(d.getDate()+k*r.intervalDays);
    }
    return fmt(d);
  }
  return null;
}
// upcoming recurring occurrences within the next `days` days (default 7), excluding ones already materialized as a real task
function upcomingRuleOccurrences(days){
  const today=todayStr();
  const horizon=new Date(today+'T00:00:00'); horizon.setDate(horizon.getDate()+ (days||7));
  const out=[];
  state.rules.forEach(r=>{
    let cur=nextDueOnOrAfter(r, today);
    let guard=0;
    while(cur && guard<20){
      const curD=new Date(cur+'T00:00:00');
      if(curD>horizon) break;
      // skip if a real task already exists for this rule+date
      const exists=state.tasks.some(t=>t.source==='recurring' && t.ruleId===r.id && t.todayDate===cur && t.status!=='Done');
      const alreadyGen = r.lastGen && r.lastGen>=cur;
      if(!exists && !alreadyGen){
        out.push({ruleId:r.id, title:r.title, date:cur, tags:[...(r.tags||[])], category:r.category||'General'});
      }
      // advance one day past cur, find next
      const nx=new Date(curD); nx.setDate(nx.getDate()+1);
      cur=nextDueOnOrAfter(r, nx.getFullYear()+'-'+String(nx.getMonth()+1).padStart(2,'0')+'-'+String(nx.getDate()).padStart(2,'0'));
      guard++;
    }
  });
  return out.sort((a,b)=>a.date.localeCompare(b.date));
}
// merged 7-day pipeline: recurring rule occurrences + scheduled one-off tasks
function upcomingPipeline(days){
  const today=todayStr();
  const horizon=new Date(today+'T00:00:00'); horizon.setDate(horizon.getDate()+(days||7));
  const rules=upcomingRuleOccurrences(days).map(r=>({...r, kind:'rule'}));
  const sched=scheduledTasks()
    .filter(t=>t.scheduledDate)
    .filter(t=>{ const d=new Date(t.scheduledDate+'T00:00:00'); return d>=new Date(today+'T00:00:00') && d<=horizon; })
    .map(t=>({kind:'sched', taskId:t.id, title:t.title, date:t.scheduledDate, tags:[...(t.tags||[])]}));
  return [...rules, ...sched].sort((a,b)=>a.date.localeCompare(b.date));
}
// pull a future recurring occurrence into Today as a real task
function materializeRuleNow(ruleId, date){
  const r=state.rules.find(x=>x.id===ruleId); if(!r) return;
  state.tasks.push({
    id:uid(), title:r.title, status:'Not Started', bucket:'Today',
    tags:[...(r.tags||[])], subtasks:[], notes:r.notesTemplate||'',
    source:'recurring', ruleId:r.id, list:'active', createdAt:Date.now(), pinned:false, person:null,
    todayDate:todayStr(), completedAt:null
  });
  // mark that cycle handled so it won't regenerate on its real day
  if(!r.lastGen || r.lastGen < date) r.lastGen = date;
  save(); render();
}

/* ================= ARCHIVE PURGE ================= */
function purgeArchive(){
  const cutoff=Date.now()-7*86400000;
  const before=state.tasks.length;
  state.tasks=state.tasks.filter(t=>!(t.completedAt && t.completedAt<cutoff));
  if(state.tasks.length!==before) save();
}

/* ================= TASK OPS ================= */
function addTask(title, list, bucket){
  if(!title.trim()) return;
  state.tasks.push({id:uid(), title:title.trim(), status:'Not Started', bucket:bucket||'Today',
    tags:[], subtasks:[], notes:'', source:'manual', list:list||'active', pinned:false, person:null, scheduledDate:null,
    createdAt:Date.now(), todayDate:(bucket||'Today')==='Today'?todayStr():null, completedAt:null});
  save(); render();
}
function addScheduledTask(title, date){
  if(!title.trim() || !date) return;
  state.tasks.push({id:uid(), title:title.trim(), status:'Not Started', bucket:'Later',
    tags:[], subtasks:[], notes:'', source:'manual', list:'scheduled', pinned:false, person:null, scheduledDate:date,
    createdAt:Date.now(), todayDate:null, completedAt:null});
  save(); render();
}
function renameTask(id, name){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  if(name && name.trim()){ t.title=name.trim(); save(); render(); }
}
function setScheduledDate(id, date){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  t.scheduledDate=date||null; save(); render();
}
function pullScheduledToToday(id){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  t.list='active'; t.bucket='Today'; t.todayDate=todayStr(); t.scheduledDate=null;
  save(); render();
}
// ===== NOTES (post-its) =====
function addNote(text){
  if(!text.trim()) return;
  state.notes.unshift({id:uid(), text:text.trim(), pinned:false, createdAt:Date.now()});
  save(); render();
}
function deleteNote(id){ state.notes=state.notes.filter(n=>n.id!==id); save(); render(); }
function toggleNotePin(id){ const n=state.notes.find(x=>x.id===id); if(n){ n.pinned=!n.pinned; save(); render(); } }
function editNote(id, text){ const n=state.notes.find(x=>x.id===id); if(n){ n.text=text.trim(); save(); render(); } }
function sortedNotes(){
  return [...state.notes].sort((a,b)=>(b.pinned-a.pinned) || (b.createdAt-a.createdAt));
}
function completeTask(id){
  const el=document.querySelector('[data-task="'+id+'"]');
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  const fin=()=>{ t.status='Done'; t.completedAt=Date.now(); openTasks.delete(id); save(); render(); };
  if(el){ el.classList.add('leaving'); setTimeout(fin,280); } else fin();
}
function setBucket(id,b){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  t.bucket=b; t.todayDate = b==='Today' ? todayStr() : null;
  save(); render();
}
function setStatus(id,s){
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  t.status=s;
  if(s!=='Follow-up') t.person=null;
  save(); render();
}
function togglePin(id){ const t=state.tasks.find(x=>x.id===id); if(!t) return; t.pinned=!t.pinned; save(); render(); }
function setPerson(id,p){ const t=state.tasks.find(x=>x.id===id); if(!t) return; t.person=p; save(); render(); }
function isOverdue(t){
  return t.status!=='Done' && t.bucket==='Today' && t.todayDate && t.todayDate<todayStr();
}
function promoteTask(id){ const t=state.tasks.find(x=>x.id===id); if(!t) return; t.list='active'; save(); render(); }
function deleteTask(id){ state.tasks=state.tasks.filter(x=>x.id!==id); openTasks.delete(id); save(); render(); }
function restoreTask(id){ const t=state.tasks.find(x=>x.id===id); if(!t) return; t.status='In Progress'; t.completedAt=null; t.list='active'; save(); render(); }

/* ================= POPOVERS (dropdowns) ================= */
function closePop(){ const p=document.querySelector('.pop'); if(p) p.remove(); document.removeEventListener('click', outsidePop, true); }
function outsidePop(e){ if(!e.target.closest('.pop')) closePop(); }
function placePop(pop, anchor){
  document.body.appendChild(pop);
  const r=anchor.getBoundingClientRect();
  pop.style.left=Math.max(8, Math.min(r.left, window.innerWidth - pop.offsetWidth - 10))+'px';
  pop.style.top=(r.bottom+window.scrollY+6)+'px';
  setTimeout(()=>document.addEventListener('click', outsidePop, true),0);
}
function openBucketMenu(btn, id){
  closePop();
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  const pop=document.createElement('div'); pop.className='pop';
  pop.innerHTML = BUCKETS.map(b=>
    '<div class="opt '+(t.bucket===b?'cur':'')+'" data-b="'+b+'">'+BUCKET_LABEL[b]+(t.bucket===b?'<span class="osub">current</span>':'')+'</div>'
  ).join('');
  pop.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',e=>{
    e.stopPropagation(); closePop(); setBucket(id, o.dataset.b);
  }));
  placePop(pop, btn);
}
function openStatusMenu(btn, id){
  closePop();

    e.stopPropagation(); closePop(); setStatus(id, o.dataset.s);

}
function openTagPop(btn, id){
  closePop();
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  const pop=document.createElement('div'); pop.className='pop';
  const draw=()=>{
    pop.innerHTML = state.tags.map(tag=>{
      const sel=t.tags.includes(tag);
      return '<div class="opt '+(sel?'sel':'')+'" data-tag="'+esc(tag)+'"><span class="box">'+(sel?'✓':'')+'</span><span class="opt-label">'+esc(tag)+'</span>'
        +'<button class="opt-mini" data-tagedit="'+esc(tag)+'" title="Rename tag">✎</button>'
        +'<button class="opt-mini" data-tagdel="'+esc(tag)+'" title="Delete tag">✕</button></div>';
    }).join('') + '<input placeholder="New tag + Enter" id="newTagIn">';
    pop.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',ev=>{
      if(ev.target.closest('[data-tagedit]')||ev.target.closest('[data-tagdel]')) return;
      ev.stopPropagation();
      const tag=o.dataset.tag;
      if(t.tags.includes(tag)) t.tags=t.tags.filter(x=>x!==tag); else t.tags.push(tag);
      save(); draw(); renderQuiet();
    }));
    pop.querySelectorAll('[data-tagedit]').forEach(b=>b.addEventListener('click',ev=>{
      ev.stopPropagation();
      const old=b.dataset.tagedit;
      const row=b.closest('.opt');
      row.innerHTML='<input class="tag-rename" value="'+esc(old)+'"><button class="opt-mini save" title="Save">✓</button>';
      const inp=row.querySelector('.tag-rename');
      const commit=()=>{
        const name=inp.value.trim();
        if(name && name!==old){
          state.tags=state.tags.map(x=>x===old?name:x);
          state.tasks.forEach(tk=>{ tk.tags=(tk.tags||[]).map(x=>x===old?name:x); });
          state.rules.forEach(r=>{ r.tags=(r.tags||[]).map(x=>x===old?name:x); });
          save();
        }
        draw(); renderQuiet();
      };
      inp.focus(); inp.select();
      inp.addEventListener('click',e=>e.stopPropagation());
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape'){ draw(); } });
      row.querySelector('.save').addEventListener('click',e=>{ e.stopPropagation(); commit(); });
    }));
    pop.querySelectorAll('[data-tagdel]').forEach(b=>b.addEventListener('click',ev=>{
      ev.stopPropagation();
      const tag=b.dataset.tagdel;
      state.tags=state.tags.filter(x=>x!==tag);
      state.tasks.forEach(tk=>{ tk.tags=(tk.tags||[]).filter(x=>x!==tag); });
      state.rules.forEach(r=>{ r.tags=(r.tags||[]).filter(x=>x!==tag); });
      save(); draw(); renderQuiet();
    }));
    const inp=pop.querySelector('#newTagIn');
    inp.addEventListener('click',e=>e.stopPropagation());
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter' && inp.value.trim()){
        const v=inp.value.trim();
        if(!state.tags.includes(v)) state.tags.push(v);
        if(!t.tags.includes(v)) t.tags.push(v);
        save(); draw(); renderQuiet();
      }
    });
  };
  draw();
  placePop(pop, btn);
}
function openPersonMenu(btn, id){
  closePop();
  const t=state.tasks.find(x=>x.id===id); if(!t) return;
  const pop=document.createElement('div'); pop.className='pop';
  const draw=()=>{
    pop.innerHTML = state.people.map(p=>
      '<div class="opt '+(t.person===p?'cur':'')+'" data-p="'+esc(p)+'"><span class="odot" style="background:var(--red)"></span><span class="opt-label">'+esc(p)+'</span>'
      +'<button class="opt-mini" data-pedit="'+esc(p)+'" title="Rename">✎</button>'
      +'<button class="opt-mini" data-pdel="'+esc(p)+'" title="Delete person">✕</button></div>'
    ).join('') + (t.person?'<div class="opt" data-p=""><span class="odot" style="background:var(--faint)"></span>Clear person</div>':'') + '<input placeholder="New person + Enter" id="newPersonIn">';
    pop.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',e=>{
      if(e.target.closest('[data-pedit]')||e.target.closest('[data-pdel]')) return;
      e.stopPropagation(); closePop(); setPerson(id, o.dataset.p||null);
    }));
    pop.querySelectorAll('[data-pedit]').forEach(b=>b.addEventListener('click',ev=>{
      ev.stopPropagation();
      const old=b.dataset.pedit;
      const row=b.closest('.opt');
      row.innerHTML='<input class="tag-rename" value="'+esc(old)+'"><button class="opt-mini save" title="Save">✓</button>';
      const inp=row.querySelector('.tag-rename');
      const commit=()=>{
        const name=inp.value.trim();
        if(name && name!==old){
          state.people=state.people.map(x=>x===old?name:x);
          state.tasks.forEach(tk=>{ if(tk.person===old) tk.person=name; });
          save();
        }
        draw();
      };
      inp.focus(); inp.select();
      inp.addEventListener('click',e=>e.stopPropagation());
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape'){ draw(); } });
      row.querySelector('.save').addEventListener('click',e=>{ e.stopPropagation(); commit(); });
    }));
    pop.querySelectorAll('[data-pdel]').forEach(b=>b.addEventListener('click',ev=>{
      ev.stopPropagation();
      const p=b.dataset.pdel;
      state.people=state.people.filter(x=>x!==p);
      state.tasks.forEach(tk=>{ if(tk.person===p) tk.person=null; });
      save(); draw(); renderQuiet();
    }));
    const inp=pop.querySelector('#newPersonIn');
    inp.addEventListener('click',e=>e.stopPropagation());
    inp.addEventListener('keydown',e=>{
      if(e.key==='Enter' && inp.value.trim()){
        const v=inp.value.trim();
        if(!state.people.includes(v)) state.people.push(v);
        closePop(); setPerson(id, v);
      }
    });
  };
  draw();
  placePop(pop, btn);
}
function renderQuiet(){ const p=document.querySelector('.pop'); render(); if(p) document.body.appendChild(p); }

/* ================= RENDER: TASK ROW ================= */
function statusChip(t){
  const m=STATUS_META[t.status]||STATUS_META['Not Started'];
  return '<button class="chip '+m.cls+'" data-act="status" title="Set status"><span class="sdot"></span>'+t.status+'<span class="dd">▾</span></button>';
}
function taskRow(t, opts){
  opts=opts||{};
  const od=isOverdue(t);
  const open=openTasks.has(t.id);
  let meta='';
  if(od) meta+='<span class="overdue-tag">OVERDUE</span>';
  meta+=statusChip(t);
  if(t.status==='Follow-up'){
    meta+='<button class="chip person-chip" data-act="person" title="Follow up with...">'+(t.person? '@'+esc(t.person) : '+ who?')+'<span class="dd">▾</span></button>';
  }
  if(opts.scheduled && t.scheduledDate){
    const d=new Date(t.scheduledDate+'T00:00:00');
    const mons=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    meta+='<span class="chip sched-chip" title="Scheduled date">📅 '+d.getDate()+' '+mons[d.getMonth()]+' '+d.getFullYear()+'</span>';
  }
  if(!opts.hideBucket && !opts.scheduled) meta+='<button class="chip bucket-'+t.bucket+'" data-act="bucket" title="Move to...">'+BUCKET_LABEL[t.bucket]+'<span class="dd">▾</span></button>';
  meta+=t.tags.map(tag=>'<span class="tagb">'+esc(tag)+'</span>').join('');
  meta+='<button class="tagplus" data-act="tags" title="Tags">+</button>';
  // subtask indicator when collapsed
  const subDone=t.subtasks.filter(s=>s.done).length;
  if(t.subtasks.length){
    meta+='<span class="sub-badge" title="Subtasks">☑ '+subDone+'/'+t.subtasks.length+'</span>';
  }
  if(t.source==='recurring') meta+='<span class="src-tag" title="Auto-generated by a recurring rule">↻</span>';
  if(opts.promote) meta+='<button class="promote" data-act="promote">Activate</button>';
  if(opts.scheduled) meta+='<button class="promote" data-act="pullsched" title="Move into Today now">→ Today</button>';
  meta+='<button class="pinbtn '+(t.pinned?'on':'')+'" data-act="pin" title="'+(t.pinned?'Unpin':'Pin')+'">'+(t.pinned?'📌':'📍')+'</button>';
  meta+='<span class="caret">▶</span>';

  const subs=t.subtasks.map(s=>
    '<div class="subtask" data-sub="'+s.id+'"><button class="sck '+(s.done?'done':'')+'" data-act="subck">'+(s.done?'✓':'')+'</button><span class="subtext '+(s.done?'done':'')+'" data-act="subedit">'+esc(s.text)+'</span><button class="del" data-act="subdel">✕</button></div>'
  ).join('');

  const schedRow = opts.scheduled
    ? '<div class="dlabel">Scheduled date</div><input type="date" class="sched-input" data-act="scheddate" value="'+(t.scheduledDate||'')+'">'
    : '';

  return '<div class="task '+(od?'overdue':'')+' '+(open?'open':'')+' '+(t.pinned?'pinned':'')+'" data-task="'+t.id+'">'
    +'<div class="trow" data-act="toggle">'
    +'<button class="ck" data-act="complete" title="Complete"></button>'
    +'<span class="ttitle" data-act="titleedit" title="Tap to edit">'+esc(t.title)+'</span>'
    +'<span class="tmeta">'+meta+'</span>'
    +'</div>'
    +'<div class="tdetail">'
    +schedRow
    +'<div class="dlabel">Subtasks</div>'+subs
    +'<div class="sub-add"><input placeholder="Add subtask + Enter" data-act="subadd"></div>'
    +'<div class="dlabel">Notes</div>'
    +'<textarea class="notes-ta" data-act="notes" placeholder="Running notes, progress log...">'+esc(t.notes)+'</textarea>'
    +'<button class="tdel" data-act="del">Delete task</button>'
    +'</div></div>';
}
function bindTaskEvents(container){
  container.querySelectorAll('.task').forEach(el=>{
    const id=el.dataset.task;
    const t=state.tasks.find(x=>x.id===id); if(!t) return;
    el.addEventListener('click', e=>{
      const actEl=e.target.closest('[data-act]');
      const act=actEl?.dataset.act;
      if(!act) return;
      if(act==='complete'){ e.stopPropagation(); completeTask(id); }
      else if(act==='bucket'){ e.stopPropagation(); openBucketMenu(actEl, id); }
      else if(act==='status'){ e.stopPropagation(); openStatusMenu(actEl, id); }
      else if(act==='person'){ e.stopPropagation(); openPersonMenu(actEl, id); }
      else if(act==='pin'){ e.stopPropagation(); togglePin(id); }
      else if(act==='tags'){ e.stopPropagation(); openTagPop(actEl, id); }
      else if(act==='promote'){ e.stopPropagation(); promoteTask(id); }
      else if(act==='pullsched'){ e.stopPropagation(); pullScheduledToToday(id); }
      else if(act==='del'){ e.stopPropagation(); deleteTask(id); }
      else if(act==='subck'){ e.stopPropagation(); const sid=e.target.closest('[data-sub]').dataset.sub; const s=t.subtasks.find(x=>x.id===sid); s.done=!s.done; save(); render(); }
      else if(act==='subdel'){ e.stopPropagation(); const sid=e.target.closest('[data-sub]').dataset.sub; t.subtasks=t.subtasks.filter(x=>x.id!==sid); save(); render(); }
      else if(act==='titleedit'){
        e.stopPropagation();
        if(actEl.querySelector('input')) return;
        const cur=t.title;
        actEl.innerHTML='<input class="title-edit" value="'+esc(cur)+'">';
        const inp=actEl.querySelector('input'); inp.focus(); inp.select();
        const commit=()=>{ renameTask(id, inp.value); };
        inp.addEventListener('click',ev=>ev.stopPropagation());
        inp.addEventListener('keydown',ev=>{ if(ev.key==='Enter') commit(); if(ev.key==='Escape') render(); });
        inp.addEventListener('blur',commit);
      }
      else if(act==='subedit'){
        e.stopPropagation();
        const row=e.target.closest('[data-sub]'); const sid=row.dataset.sub;
        const s=t.subtasks.find(x=>x.id===sid); if(!s) return;
        if(row.querySelector('.subedit-in')) return;
        e.target.outerHTML='<input class="subedit-in" value="'+esc(s.text)+'">';
        const inp=row.querySelector('.subedit-in'); inp.focus(); inp.select();
        const commit=()=>{ if(inp.value.trim()) s.text=inp.value.trim(); save(); render(); openTasks.add(id); };
        inp.addEventListener('click',ev=>ev.stopPropagation());
        inp.addEventListener('keydown',ev=>{ if(ev.key==='Enter') commit(); if(ev.key==='Escape') render(); });
        inp.addEventListener('blur',commit);
      }
      else if(act==='toggle'){
        if(e.target.closest('.tdetail')) return;
        if(openTasks.has(id)) openTasks.delete(id); else openTasks.add(id);
        render();
      }
    });
    const notes=el.querySelector('[data-act="notes"]');
    if(notes){ notes.addEventListener('click',e=>e.stopPropagation()); notes.addEventListener('input',()=>{ t.notes=notes.value; save(); }); }
    const sadd=el.querySelector('[data-act="subadd"]');
    if(sadd){ sadd.addEventListener('click',e=>e.stopPropagation()); sadd.addEventListener('keydown',e=>{
      if(e.key==='Enter' && sadd.value.trim()){ t.subtasks.push({id:uid(),text:sadd.value.trim(),done:false}); save(); render(); openTasks.add(id); }
    });}
    const sched=el.querySelector('[data-act="scheddate"]');
    if(sched){ sched.addEventListener('click',e=>e.stopPropagation()); sched.addEventListener('change',()=>{ setScheduledDate(id, sched.value); }); }
  });
}

/* ================= VIEWS ================= */
function activeTasks(){ return state.tasks.filter(t=>t.status!=='Done' && t.list==='active'); }
function backlogTasks(){ return state.tasks.filter(t=>t.status!=='Done' && t.list==='backlog'); }
function scheduledTasks(){ return state.tasks.filter(t=>t.status!=='Done' && t.list==='scheduled'); }
function archivedTasks(){ return state.tasks.filter(t=>t.status==='Done'); }
function sortToday(a,b){ return (isOverdue(b)-isOverdue(a)) || (a.createdAt-b.createdAt); }

function secHead(title,count,extra,color,toggleId,openState){
  const dot = color? '<span class="sec-dot" style="background:'+color+';box-shadow:0 0 10px '+color+'"></span>' : '<span class="sec-dot"></span>';
  const tt = color? '<span class="sec-title" style="color:'+color+'">'+title+'</span>' : '<span class="sec-title">'+title+'</span>';
  const car = toggleId? '<span class="sec-caret '+(openState?'open':'')+'">▶</span>' : '';
  const clickable = toggleId? ' data-sectoggle="'+toggleId+'" style="cursor:pointer"' : '';
  return '<div class="sec-head"'+clickable+'>'+car+dot+tt+'<span class="sec-line"></span><span class="sec-count">'+count+'</span>'+(extra||'')+'</div>';
}
const BUCKET_COLOR = {Today:'var(--bkt-today)', Week:'var(--bkt-week)', Later:'var(--bkt-later)'};
const STATUS_ORDER = ['Follow-up','In Progress','Not Started'];

// filter a task list by the active filter bar
function applyFilters(list){
  return list.filter(t=>{
    if(filterStatus && t.status!==filterStatus) return false;
    if(filterStatus==='Follow-up' && filterPerson && t.person!==filterPerson) return false;
    return true;
  });
}
function filterActive(){ return !!filterStatus; }

// render a bucket's tasks: pinned first, then optionally grouped by status
function renderBucketBody(tasks){
  const pinned = tasks.filter(t=>t.pinned);
  const rest = tasks.filter(t=>!t.pinned);
  let h='';
  if(pinned.length){
    h+='<div class="pin-band">'+pinned.sort(sortToday).map(t=>taskRow(t)).join('')+'</div>';
  }
  if(state.ui.groupByStatus && !filterActive()){
    STATUS_ORDER.forEach(s=>{
      const g=rest.filter(t=>t.status===s).sort(sortToday);
      if(!g.length) return;
      const m=STATUS_META[s];
      h+='<div class="substat"><span class="substat-dot" style="background:'+m.dot+';box-shadow:0 0 7px '+m.dot+'"></span>'+s+'<span class="substat-n">'+g.length+'</span></div>';
      h+=g.map(t=>taskRow(t)).join('');
    });
    const untagged=rest.filter(t=>!STATUS_ORDER.includes(t.status));
    untagged.sort(sortToday).forEach(t=>h+=taskRow(t));
  } else {
    h+=rest.sort(sortToday).map(t=>taskRow(t)).join('');
  }
  return h || '<div class="empty">—</div>';
}

function filterBar(){
  let h='<div class="filterbar">';
  h+='<span class="fb-label">Filter</span>';
  h+='<button class="fb-chip '+(!filterStatus?'on':'')+'" data-fstatus="">All</button>';
  STATUSES.forEach(s=>{
    const m=STATUS_META[s];
    h+='<button class="fb-chip '+(filterStatus===s?'on':'')+'" data-fstatus="'+s+'"><span class="fbdot" style="background:'+m.dot+'"></span>'+s+'</button>';
  });
  if(filterStatus==='Follow-up'){
    h+='<span class="fb-sep"></span><span class="fb-label">With</span>';
    h+='<button class="fb-chip '+(!filterPerson?'on':'')+'" data-fperson="">Anyone</button>';
    const people=[...new Set(state.tasks.filter(t=>t.status==='Follow-up'&&t.person).map(t=>t.person))];
    people.forEach(p=>{
      h+='<button class="fb-chip '+(filterPerson===p?'on':'')+'" data-fperson="'+esc(p)+'">@'+esc(p)+'</button>';
    });
  }
  h+='</div>';
  return h;
}

    const go=()=>{ addTask(dAdd.value,'active','Today'); };
    dAdd.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
    document.getElementById('dashAddBtn').addEventListener('click',go);
  }
  const lAdd=document.getElementById('listAdd');
  if(lAdd){
    const go=()=>{ addTask(lAdd.value, view==='backlog'?'backlog':'active', view==='backlog'?'Later':'Today'); };
    lAdd.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
    document.getElementById('listAddBtn').addEventListener('click',go);
  }

  // recurring — help
  const ht=document.getElementById('helpToggle');
  if(ht) ht.addEventListener('click',()=>{ state.ui.helpOpen=!state.ui.helpOpen; save(); render(); });
  // recurring — section management
  const nsBtn=document.getElementById('newSectionBtn');
  if(nsBtn){
    const nsIn=document.getElementById('newSectionIn');
    const nsCol=document.getElementById('newSectionColor');
    const addSec=()=>{
      const v=nsIn.value.trim(); if(!v) return;
      if(!state.categories.includes(v)) state.categories.push(v);
      state.catColors[v]=nsCol.value;
      state.ui.catOpen[v]=true;
      save(); render();
    };
    nsBtn.addEventListener('click',addSec);
    nsIn.addEventListener('keydown',e=>{ if(e.key==='Enter') addSec(); });
  }
  document.querySelectorAll('[data-catedit]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    renamingCat=b.dataset.catedit; render();
    const inp=document.getElementById('catRenameIn'); if(inp){ inp.focus(); inp.select(); }
  }));
  const commitRename=(old, name)=>{
    name=(name||'').trim();
    renamingCat=null;
    if(!name || name===old){ render(); return; }
    state.categories=state.categories.map(c=>c===old?name:c);
    if(state.catColors[old]!==undefined){ state.catColors[name]=state.catColors[old]; delete state.catColors[old]; }
    if(state.ui.catOpen[old]!==undefined){ state.ui.catOpen[name]=state.ui.catOpen[old]; delete state.ui.catOpen[old]; }
    state.rules.forEach(r=>{ if((r.category||'General')===old) r.category=name; });
    save(); render();
  };
  document.querySelectorAll('[data-catsave]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    commitRename(b.dataset.catsave, document.getElementById('catRenameIn').value);
  }));
  const rin=document.getElementById('catRenameIn');
  if(rin){
    rin.addEventListener('click',e=>e.stopPropagation());
    rin.addEventListener('keydown',e=>{ if(e.key==='Enter') commitRename(renamingCat, rin.value); if(e.key==='Escape'){ renamingCat=null; render(); } });
  }
  document.querySelectorAll('[data-catcolor]').forEach(sw=>{
    sw.addEventListener('click',e=>e.stopPropagation());
    sw.addEventListener('input',()=>{ state.catColors[sw.dataset.catcolor]=sw.value; save(); });
    sw.addEventListener('change',()=>{ state.catColors[sw.dataset.catcolor]=sw.value; save(); render(); });
  });
  document.querySelectorAll('[data-catdel]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    const c=b.dataset.catdel;
    state.categories=state.categories.filter(x=>x!==c);
    delete state.ui.catOpen[c];
    save(); render();
  }));
  const nrb=document.getElementById('newRuleBtn');
  if(nrb) nrb.addEventListener('click',()=>{
    if(!state.categories.length){ state.categories=['General']; }
    editingRule=true; formTags=[]; render();
  });
  document.querySelectorAll('.cat-head').forEach(ch=>ch.addEventListener('click',e=>{
    if(e.target.closest('[data-catdel]')||e.target.closest('[data-catedit]')||e.target.closest('[data-catcolor]')||e.target.closest('[data-catsave]')||e.target.closest('.cat-rename')) return;
    const c=ch.dataset.cat; state.ui.catOpen[c]=!state.ui.catOpen[c]; save(); render();
  }));
  document.querySelectorAll('.redit').forEach(b=>b.addEventListener('click',()=>{
    editingRule=state.rules.find(r=>r.id===b.dataset.rule);
    formTags=[...(editingRule.tags||[])];
    render();
    document.querySelector('.rule-form')?.scrollIntoView({behavior:'smooth'});
  }));
  document.querySelectorAll('.rdel').forEach(b=>b.addEventListener('click',()=>{
    state.rules=state.rules.filter(r=>r.id!==b.dataset.rule); save(); render();
  }));
  const rfType=document.getElementById('rf_type');
  if(rfType){
    const sync=()=>{
      const v=rfType.value;
      document.getElementById('rf_weekday').style.display = v==='weekly'?'block':'none';
      document.getElementById('rf_monthday').style.display = (v==='monthly'||v==='quarterly')?'block':'none';
      document.getElementById('rf_interval').style.display = v==='interval'?'block':'none';
    };
    rfType.addEventListener('change',sync);
    document.querySelectorAll('[data-picktag]').forEach(b=>b.addEventListener('click',()=>{
      const t=b.dataset.picktag;
      if(formTags.includes(t)) formTags=formTags.filter(x=>x!==t); else formTags.push(t);
      b.classList.toggle('sel');
    }));
    const nt=document.getElementById('rf_newtag');
    nt.addEventListener('keydown',e=>{
      if(e.key==='Enter' && nt.value.trim()){
        const v=nt.value.trim();
        if(!state.tags.includes(v)) state.tags.push(v);
        if(!formTags.includes(v)) formTags.push(v);
        save();
        const btn=document.createElement('button');
        btn.className='pick sel'; btn.dataset.picktag=v; btn.textContent=v;
        btn.addEventListener('click',()=>{
          if(formTags.includes(v)) formTags=formTags.filter(x=>x!==v); else formTags.push(v);
          btn.classList.toggle('sel');
        });
        document.getElementById('rf_tagpick').insertBefore(btn, nt.parentElement);
        nt.value='';
      }
    });
    document.getElementById('rf_cancel').addEventListener('click',()=>{ editingRule=null; formTags=[]; render(); });
    document.getElementById('rf_save').addEventListener('click',()=>{
      const title=document.getElementById('rf_title').value.trim();
      if(!title) return;
      const cat=document.getElementById('rf_cat').value;
      const obj={
        title, category:cat, type:rfType.value,
        weekday:+document.getElementById('rf_weekday').value,
        monthday:+document.getElementById('rf_monthday').value||1,
        intervalDays:+document.getElementById('rf_interval').value||7,
        anchor:todayStr(), tags:[...formTags],
        notesTemplate:document.getElementById('rf_notes').value
      };
      if(typeof editingRule==='object' && editingRule){ Object.assign(editingRule,obj); }
      else { obj.id=uid(); obj.lastGen=null; obj.createdOn=todayStr(); state.rules.push(obj); }
      editingRule=null; formTags=[]; save(); generateFromRules(); render();
    });
  }

  document.querySelectorAll('[data-restore]').forEach(b=>b.addEventListener('click',()=>restoreTask(b.dataset.restore)));
  const pb=document.getElementById('purgeBtn');
  if(pb) pb.addEventListener('click',()=>{
    if(!purgeArmed){ purgeArmed=true; render(); return; }
    state.tasks=state.tasks.filter(t=>t.status!=='Done');
    purgeArmed=false; save(); render();
  });

  // ===== MANAGE: tags =====
  const mtBtn=document.getElementById('mngTagBtn');
  if(mtBtn){
    const mtIn=document.getElementById('mngTagIn');
    const addTag=()=>{ const v=mtIn.value.trim(); if(!v) return; if(!state.tags.includes(v)) state.tags.push(v); save(); render(); };
    mtBtn.addEventListener('click',addTag);
    mtIn.addEventListener('keydown',e=>{ if(e.key==='Enter') addTag(); });
  }
  document.querySelectorAll('[data-tagedit]').forEach(b=>b.addEventListener('click',()=>{
    const old=b.dataset.tagedit;
    const row=b.closest('.mng-row');
    row.querySelector('.mng-name').outerHTML='<input class="mng-rename" value="'+esc(old)+'"><button class="mng-save" data-tsave="'+esc(old)+'">Save</button>';
    const inp=row.querySelector('.mng-rename'); inp.focus(); inp.select();
    const commit=()=>{
      const name=inp.value.trim();
      if(name && name!==old){
        state.tags=state.tags.map(x=>x===old?name:x);
        state.tasks.forEach(t=>{ t.tags=(t.tags||[]).map(x=>x===old?name:x); });
        state.rules.forEach(r=>{ r.tags=(r.tags||[]).map(x=>x===old?name:x); });
        save();
      }
      render();
    };
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape') render(); });
    row.querySelector('.mng-save').addEventListener('click',commit);
  }));
  document.querySelectorAll('[data-tagdel]').forEach(b=>b.addEventListener('click',()=>{
    const tag=b.dataset.tagdel;
    state.tags=state.tags.filter(x=>x!==tag);
    state.tasks.forEach(t=>{ t.tags=(t.tags||[]).filter(x=>x!==tag); });
    state.rules.forEach(r=>{ r.tags=(r.tags||[]).filter(x=>x!==tag); });
    save(); render();
  }));

  // ===== MANAGE: people =====
  const mpBtn=document.getElementById('mngPersonBtn');
  if(mpBtn){
    const mpIn=document.getElementById('mngPersonIn');
    const addP=()=>{ const v=mpIn.value.trim(); if(!v) return; if(!state.people.includes(v)) state.people.push(v); save(); render(); };
    mpBtn.addEventListener('click',addP);
    mpIn.addEventListener('keydown',e=>{ if(e.key==='Enter') addP(); });
  }
  document.querySelectorAll('[data-personedit]').forEach(b=>b.addEventListener('click',()=>{
    const old=b.dataset.personedit;
    const row=b.closest('.mng-row');
    row.querySelector('.mng-name').outerHTML='<input class="mng-rename" value="'+esc(old)+'"><button class="mng-save">Save</button>';
    const inp=row.querySelector('.mng-rename'); inp.focus(); inp.select();
    const commit=()=>{
      const name=inp.value.trim();
      if(name && name!==old){
        state.people=state.people.map(x=>x===old?name:x);
        state.tasks.forEach(t=>{ if(t.person===old) t.person=name; });
        save();
      }
      render();
    };
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') commit(); if(e.key==='Escape') render(); });
    row.querySelector('.mng-save').addEventListener('click',commit);
  }));
  document.querySelectorAll('[data-persondel]').forEach(b=>b.addEventListener('click',()=>{
    const p=b.dataset.persondel;
    state.people=state.people.filter(x=>x!==p);
    state.tasks.forEach(t=>{ if(t.person===p) t.person=null; });
    save(); render();
  }));
}

  document.getElementById('settingsSheet').classList.toggle('hidden');
});

  if(e.target.id==='settingsSheet') closeSettings();
});
document.getElementById('themeToggle').addEventListener('click',()=>{
  state.ui.theme = (state.ui.theme==='light') ? 'dark' : 'light';
  if(state.ui.theme==='dark' && state.ui.accent==='ivory') state.ui.accent='ember';
  applyTheme(); save();
});
document.getElementById('accentToggle').addEventListener('click',()=>{
  const order=['ember','ivory','aurora'];
  const i=order.indexOf(state.ui.accent||'ember');
  state.ui.accent = order[(i+1)%order.length];
  if(state.ui.accent==='ivory') state.ui.theme='light';
  applyTheme(); save();
});

/* ================= HEADER DATE ================= */
function setDate(){
  const d=new Date();
  const wd=['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'][d.getDay()];
  const mo=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()];
  document.getElementById('hdate').textContent = wd+' · '+String(d.getDate()).padStart(2,'0')+' '+mo+' '+d.getFullYear();
}

/* ================= BOOT ================= */
window.startAscentApp = async function(){
  await load();
  applyTheme();
  purgeArchive();
  generateFromRules();
  setDate();
  render();
  // re-assert theme on next frame in case of any late style application
  requestAnimationFrame(applyTheme);
  setInterval(()=>{ generateFromRules(); }, 60*60*1000);
};
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ====== PASTE YOUR FIREBASE CONFIG HERE (from Firebase Console > Project Settings) ======
const firebaseConfig = {
  apiKey: "AIzaSyBE4p1xC9vxEAszuujXdLg1kLIfFVRTNmQ",
  authDomain: "ascent-98320.firebaseapp.com",
  projectId: "ascent-98320",
  storageBucket: "ascent-98320.firebasestorage.app",
  messagingSenderId: "197472907512",
  appId: "1:197472907512:web:595bab0f966ad59da00b0d"
};
// ==========================================================================================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUid = null;
function docRef(){ return doc(db, 'ascentUsers', currentUid); }

window.cloudSave = async function(state){
  if(!currentUid) return;
  await setDoc(docRef(), { data: JSON.stringify(state) }, { merge: true });
};
window.cloudLoad = async function(){
  if(!currentUid) return null;
  const snap = await getDoc(docRef());
  if(snap.exists() && snap.data().data) return JSON.parse(snap.data().data);
  return null;
};

const gate = document.getElementById('authGate');
const statusEl = document.getElementById('authStatus');

document.getElementById('googleSignIn').addEventListener('click', async ()=>{
  statusEl.textContent = 'Opening Google sign-in...';
  try{ await signInWithPopup(auth, provider); }
  catch(e){ statusEl.textContent = 'Sign-in failed — try again.'; console.error(e); }
});

onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUid = user.uid;
    gate.classList.add('hidden');
    await window.startAscentApp();
  } else {
    currentUid = null;
    gate.classList.remove('hidden');
  }
});
</script>
